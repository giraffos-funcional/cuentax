# CUENTAX — Docker Compose PRODUCCIÓN
# =====================================
# Deploy en servidor VPS/Coolify.
# Diferencias vs dev:
#   - Imágenes buildeadas (no volúmenes de código)
#   - Variables via env_file o secrets
#   - Nginx como reverse proxy con SSL
#   - Health checks más estrictos
#   - Sin herramientas de debug
#   - Restart: always

name: cuentax-prod

networks:
  cuentax-internal:
    driver: bridge
  cuentax-public:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  odoo_data:
  odoo_addons:
  nginx_certs:
  nginx_html:

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cuentax-postgres-prod
    restart: always
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cuentax}
      POSTGRES_USER: ${POSTGRES_USER:-cuentax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./infra/postgres/odoo_user.sql:/docker-entrypoint-initdb.d/02_odoo_user.sql:ro
    # En producción NO exponer el puerto al exterior
    expose:
      - "5432"
    networks:
      - cuentax-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cuentax}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cuentax-redis-prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - cuentax-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── SII Bridge (FastAPI) ───────────────────────────────────
  sii-bridge:
    image: ${REGISTRY:-ghcr.io}/giraffos-funcional/cuentax-sii-bridge:${TAG:-latest}
    container_name: cuentax-sii-bridge-prod
    restart: always
    env_file: .env.prod
    environment:
      - SII_AMBIENTE=${SII_AMBIENTE:-certificacion}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - LOG_LEVEL=INFO
    expose:
      - "8000"
    networks:
      - cuentax-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # ── BFF (Fastify) ──────────────────────────────────────────
  bff:
    image: ${REGISTRY:-ghcr.io}/giraffos-funcional/cuentax-bff:${TAG:-latest}
    container_name: cuentax-bff-prod
    restart: always
    env_file: .env.prod
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SII_BRIDGE_URL=http://sii-bridge:8000/api/v1
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - ODOO_URL=http://odoo:8069
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sii-bridge:
        condition: service_healthy
    expose:
      - "4000"
    networks:
      - cuentax-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── Frontend (Next.js) ─────────────────────────────────────
  web:
    image: ${REGISTRY:-ghcr.io}/giraffos-funcional/cuentax-web:${TAG:-latest}
    container_name: cuentax-web-prod
    restart: always
    env_file: .env.prod
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BFF_URL=${NEXT_PUBLIC_BFF_URL:-https://api.cuentax.cl}
    depends_on:
      - bff
    expose:
      - "3000"
    networks:
      - cuentax-internal
      - cuentax-public

  # ── Odoo 18 ───────────────────────────────────────────────
  odoo:
    image: odoo:18
    container_name: cuentax-odoo-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - HOST=postgres
      - PORT=5432
      - USER=odoo
      - PASSWORD=${ODOO_DB_PASSWORD}
    volumes:
      - odoo_data:/var/lib/odoo
      - odoo_addons:/mnt/extra-addons
      - ./infra/odoo/odoo.prod.conf:/etc/odoo/odoo.conf:ro
    expose:
      - "8069"
      - "8072"
    networks:
      - cuentax-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8069/web/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Nginx (Reverse Proxy + SSL) ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cuentax-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
      - nginx_html:/var/www/html
    depends_on:
      - web
      - bff
      - odoo
    networks:
      - cuentax-internal
      - cuentax-public
