name: Deploy — Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Coolify Staging
    runs-on: ubuntu-latest
    needs: [] # Se agrega referencia a CI cuando esté listo
    steps:
      - name: Trigger Coolify Deploy
        run: |
          curl -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"type": "deploy"}'

      - name: Wait for deploy health
        run: |
          echo "⏳ Esperando que el deploy esté saludable..."
          sleep 30
          curl -f "https://api.sii.giraffos.com/health" || (echo "❌ Health check falló" && exit 1)
          curl -f "https://api.sii.giraffos.com/api/v1/sii-bridge/health/detailed" || true
          echo "✅ Deploy exitoso"
