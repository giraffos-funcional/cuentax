name: CUENTAX — Deploy Producción

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Servicio a deployar (all | web | bff | sii-bridge)'
        required: false
        default: 'all'

env:
  REGISTRY: ghcr.io
  ORG: giraffos-funcional

jobs:
  # ── Tests ──────────────────────────────────────────────────
  test-bff:
    name: Tests BFF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: cd apps/bff && pnpm test
        name: Vitest

  test-sii-bridge:
    name: Tests SII Bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: cd apps/sii-bridge && pip install -r requirements.txt
      - run: cd apps/sii-bridge && pytest tests/ -v

  # ── Build & Push Imágenes ──────────────────────────────────
  build-web:
    name: Build Web (Next.js)
    needs: [test-bff]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/cuentax-web:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/cuentax-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-bff:
    name: Build BFF (Fastify)
    needs: [test-bff]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/bff/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/cuentax-bff:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/cuentax-bff:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-sii-bridge:
    name: Build SII Bridge (FastAPI)
    needs: [test-sii-bridge]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: apps/sii-bridge
          file: apps/sii-bridge/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/cuentax-sii-bridge:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/cuentax-sii-bridge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy a Coolify ───────────────────────────────────────
  deploy:
    name: Deploy a Producción (Coolify)
    needs: [build-web, build-bff, build-sii-bridge]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via Coolify Webhook
        run: |
          # Coolify expone webhooks por servicio
          # Configurar en Coolify → Application → Deploy Webhook
          if [ "${{ github.event.inputs.service }}" == "web" ] || [ "${{ github.event.inputs.service }}" == "all" ] || [ -z "${{ github.event.inputs.service }}" ]; then
            curl -s -X GET "${{ secrets.COOLIFY_WEBHOOK_WEB }}" || echo "Web webhook failed"
          fi
          if [ "${{ github.event.inputs.service }}" == "bff" ] || [ "${{ github.event.inputs.service }}" == "all" ] || [ -z "${{ github.event.inputs.service }}" ]; then
            curl -s -X GET "${{ secrets.COOLIFY_WEBHOOK_BFF }}" || echo "BFF webhook failed"
          fi
          if [ "${{ github.event.inputs.service }}" == "sii-bridge" ] || [ "${{ github.event.inputs.service }}" == "all" ] || [ -z "${{ github.event.inputs.service }}" ]; then
            curl -s -X GET "${{ secrets.COOLIFY_WEBHOOK_SII_BRIDGE }}" || echo "SII Bridge webhook failed"
          fi

      - name: Notify deploy
        run: |
          echo "✅ Deploy completado — SHA: ${{ github.sha }}"
          echo "   Web:        ${{ env.REGISTRY }}/${{ env.ORG }}/cuentax-web:${{ github.sha }}"
          echo "   BFF:        ${{ env.REGISTRY }}/${{ env.ORG }}/cuentax-bff:${{ github.sha }}"
          echo "   SII Bridge: ${{ env.REGISTRY }}/${{ env.ORG }}/cuentax-sii-bridge:${{ github.sha }}"
