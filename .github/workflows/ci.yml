name: CI — Lint, Typecheck & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ----------------------------------------------------------
  # Node.js — BFF + Web
  # ----------------------------------------------------------
  node-ci:
    name: Node.js CI (BFF + Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Type check
        run: pnpm turbo typecheck

      - name: Tests
        run: pnpm turbo test

  # ----------------------------------------------------------
  # Python — SII Bridge
  # ----------------------------------------------------------
  python-ci:
    name: Python CI (SII Bridge)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/sii-bridge

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/sii-bridge/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libcairo2

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/ tests/

      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports

      - name: Tests (pytest)
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing
        env:
          PYTHON_ENV: test
          SII_AMBIENTE: certificacion
          JWT_SECRET: test_secret_min_32_chars_long_for_ci
          ODOO_URL: http://localhost:8069
          ODOO_DB: test_db
          REDIS_URL: redis://localhost:6379
          SII_BRIDGE_URL: http://localhost:8001

  # ----------------------------------------------------------
  # Security scan
  # ----------------------------------------------------------
  security:
    name: Security Scan (Victor)
    runs-on: ubuntu-latest
    needs: [node-ci, python-ci]
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified
