# CUENTAX — Docker Compose (Desarrollo Local)
# ============================================
# Levanta: PostgreSQL + Redis + Odoo 18 + SII Bridge
# El frontend (Next.js) y BFF (Fastify) corren fuera de Docker
# para hot-reload en desarrollo.
#
# Uso:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml logs -f odoo
#   docker compose -f docker-compose.dev.yml logs -f sii-bridge

name: cuentax-dev

networks:
  cuentax-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  odoo_data:
  odoo_addons:

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cuentax-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cuentax
      POSTGRES_USER: cuentax
      POSTGRES_PASSWORD: cuentax
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./infra/postgres/odoo_user.sql:/docker-entrypoint-initdb.d/02_odoo_user.sql:ro
    ports:
      - "5432:5432"
    networks:
      - cuentax-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuentax -d cuentax"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cuentax-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cuentax-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Odoo 18 ───────────────────────────────────────────────
  odoo:
    image: odoo:18
    container_name: cuentax-odoo
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - HOST=postgres
      - PORT=5432
      - USER=odoo
      - PASSWORD=cuentax_odoo
    volumes:
      - odoo_data:/var/lib/odoo
      - odoo_addons:/mnt/extra-addons
      - ./infra/odoo/odoo.conf:/etc/odoo/odoo.conf:ro
    ports:
      - "8069:8069"
      - "8072:8072"   # longpolling
    networks:
      - cuentax-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8069/web/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── SII Bridge (FastAPI Python) ────────────────────────────
  sii-bridge:
    build:
      context: ./apps/sii-bridge
      dockerfile: Dockerfile
    container_name: cuentax-sii-bridge
    restart: unless-stopped
    environment:
      - SII_AMBIENTE=certificacion
      - INTERNAL_SECRET=dev_internal_secret_CHANGE_IN_PRODUCTION
      - LOG_LEVEL=DEBUG
    ports:
      - "8000:8000"
    networks:
      - cuentax-net
    volumes:
      - ./apps/sii-bridge:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Adminer (DB GUI) ───────────────────────────────────────
  adminer:
    image: adminer
    container_name: cuentax-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - cuentax-net
    profiles:
      - tools
