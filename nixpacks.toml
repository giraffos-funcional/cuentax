# Nixpacks config for CuentaX BFF
# Adds system dependencies needed for Playwright/Chromium headless browser

[phases.setup]
aptPkgs = [
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libgbm1",
  "libasound2",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libxkbcommon0",
  "libdrm2",
  "libgtk-3-0",
  "libdbus-1-3",
  "libnspr4",
  "fonts-liberation",
  "wget",
]
