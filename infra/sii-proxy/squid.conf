# CUENTAX — Squid proxy config (solo SII)
# Solo permite tráfico HTTPS a dominios del SII Chile.
# Token de autenticación vía header para seguridad básica.

# Basics
http_port 3128

# ACLs - solo permitir dominios del SII
acl sii_domains dstdomain .sii.cl
acl SSL_ports port 443
acl CONNECT method CONNECT

# Auth via header (el sii-bridge envía este header)
acl cuentax_auth req_header X-Proxy-Token cuentax-sii-proxy-2024

# Rules
http_access allow CONNECT sii_domains SSL_ports cuentax_auth
http_access deny all

# Performance
cache deny all
forwarded_for delete
via off

# Logging
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr

# Security
visible_hostname cuentax-sii-proxy
httpd_suppress_version_string on
