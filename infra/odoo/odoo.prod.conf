[options]
; addons_path includes OCA payroll modules at /opt/oca/payroll
addons_path = /mnt/extra-addons,/opt/oca/payroll,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo
; db_host, db_user, db_password are overridden by HOST, USER, PASSWORD env vars
; set via Coolify service environment variables
db_host = False
db_port = 5432
db_user = False
db_password = False
without_demo = True
log_level = warn
longpolling_port = 8072
workers = 4
max_cron_threads = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 60
limit_time_real = 120
list_db = False
proxy_mode = True
