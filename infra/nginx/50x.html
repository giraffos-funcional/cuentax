<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CuentaX - Mantenimiento</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: #38bdf8;
      letter-spacing: -0.025em;
      margin-bottom: 2rem;
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      opacity: 0.7;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background-color: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 0.875rem;
      transition: background-color 0.2s;
      border: none;
      cursor: pointer;
    }
    .retry-btn:hover {
      background-color: #7dd3fc;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">CuentaX</div>
    <div class="icon">&#9881;</div>
    <h1>Estamos realizando mantenimiento</h1>
    <p>Intenta nuevamente en unos minutos. Estamos trabajando para mejorar tu experiencia.</p>
    <button class="retry-btn" onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
