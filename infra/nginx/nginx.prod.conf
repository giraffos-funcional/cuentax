# ── Custom log format with request correlation ID ────────────
log_format main '$remote_addr - $remote_user [$time_local] "$request" '
               '$status $body_bytes_sent "$http_referer" '
               '"$http_user_agent" "$request_id"';
access_log /var/log/nginx/access.log main;

# ── Rate limiting zones (must be in http context, before server blocks) ──
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/s;
limit_req_status 429;
limit_req_log_level warn;

server {
    listen 80;
    server_name cuentax.cl www.cuentax.cl api.cuentax.cl erp.cuentax.cl;

    # Redirigir todo a HTTPS
    # Health check endpoint (used by Docker healthcheck)
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── App principal (cuentax.cl) ────────────────────────────────
server {
    listen 443 ssl http2;
    server_name cuentax.cl www.cuentax.cl;

    ssl_certificate     /etc/nginx/certs/cuentax.cl/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/cuentax.cl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20M;

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID $request_id;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static assets con caché agresivo
    location /_next/static/ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ── BFF / API (api.cuentax.cl) ────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.cuentax.cl;

    ssl_certificate     /etc/nginx/certs/cuentax.cl/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/cuentax.cl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 10M;

    # Proxy timeouts
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 30s;

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Health/metrics endpoints — no rate limit (internal monitoring)
    location /health {
        access_log off;
        proxy_pass         http://bff:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID $request_id;
    }

    location /metrics {
        access_log off;
        proxy_pass         http://bff:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID $request_id;
    }

    # Auth endpoints — strict rate limit (3r/s, burst 5)
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass         http://bff:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID $request_id;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "https://cuentax.cl";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key";
            add_header Access-Control-Allow-Credentials "true";
            add_header Content-Length 0;
            return 204;
        }
    }

    # General API — moderate rate limit (10r/s, burst 20)
    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://bff:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID $request_id;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "https://cuentax.cl";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key";
            add_header Access-Control-Allow-Credentials "true";
            add_header Content-Length 0;
            return 204;
        }
    }
}

# ── Odoo ERP (erp.cuentax.cl) ────────────────────────────────
server {
    listen 443 ssl http2;
    server_name erp.cuentax.cl;

    ssl_certificate     /etc/nginx/certs/cuentax.cl/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/cuentax.cl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 50M;

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Odoo web
    location / {
        proxy_pass         http://odoo:8069;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Request-ID $request_id;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
    }

    # Odoo longpolling (chat, notificaciones en tiempo real)
    location /longpolling {
        proxy_pass         http://odoo:8072;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Request-ID $request_id;
    }

    # Archivos estáticos de Odoo
    location ~* /web/static/ {
        proxy_pass         http://odoo:8069;
        add_header         Cache-Control "public, max-age=86400";
    }
}
