server {
    listen 80;
    server_name cuentax.cl www.cuentax.cl api.cuentax.cl erp.cuentax.cl;

    # Redirigir todo a HTTPS
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── App principal (cuentax.cl) ────────────────────────────────
server {
    listen 443 ssl http2;
    server_name cuentax.cl www.cuentax.cl;

    ssl_certificate     /etc/nginx/certs/cuentax.cl/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/cuentax.cl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static assets con caché agresivo
    location /_next/static/ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ── BFF / API (api.cuentax.cl) ────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.cuentax.cl;

    ssl_certificate     /etc/nginx/certs/cuentax.cl/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/cuentax.cl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Rate limit para la API
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req zone=api_limit burst=20 nodelay;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://bff:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "https://cuentax.cl";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key";
            add_header Access-Control-Allow-Credentials "true";
            add_header Content-Length 0;
            return 204;
        }
    }
}

# ── Odoo ERP (erp.cuentax.cl) ────────────────────────────────
server {
    listen 443 ssl http2;
    server_name erp.cuentax.cl;

    ssl_certificate     /etc/nginx/certs/cuentax.cl/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/cuentax.cl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 50M;

    # Odoo web
    location / {
        proxy_pass         http://odoo:8069;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
    }

    # Odoo longpolling (chat, notificaciones en tiempo real)
    location /longpolling {
        proxy_pass         http://odoo:8072;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # Archivos estáticos de Odoo
    location ~* /web/static/ {
        proxy_pass         http://odoo:8069;
        add_header         Cache-Control "public, max-age=86400";
    }
}
