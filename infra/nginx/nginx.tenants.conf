# ─────────────────────────────────────────────────────────────────────
# CUENTAX — Wildcard tenant subdomain server block (Phase 00, T0.9)
# ─────────────────────────────────────────────────────────────────────
#
# Add this block to nginx.prod.conf AFTER the `cuentax.cl` apex block.
# It catches any subdomain of cuentax.cl that is not explicitly handled
# above (cuentax.cl, www, api, erp, admin), extracts the slug, and
# proxies to the web app with `X-Tenant-Slug` header. The BFF middleware
# also reads from Host directly, so this header is belt-and-suspenders.
#
# Requires:
#   • Wildcard cert at /etc/nginx/certs/cuentax.cl/fullchain.pem (issued
#     by `infra/scripts/issue-wildcard-cert.sh`).
#   • DNS `*.cuentax.cl A <LB_IP>`.
#
# To install: include this file from the main http context of
# nginx.prod.conf, e.g.:
#   include /etc/nginx/conf.d/nginx.tenants.conf;
# Or copy the server blocks below directly into nginx.prod.conf.
# ─────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect for wildcard ────────────────────────────────
server {
    listen 80;
    server_name ~^(?<sub>[^.]+)\.cuentax\.cl$;

    # Skip subdomains already handled (api, www, erp, admin) — those have
    # their own server blocks. Nginx matches the most-specific server_name
    # first, so this regex block only catches the rest. Keep this block
    # AFTER the explicit ones in the same http context.

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS wildcard for tenant subdomains ──────────────────────────────
server {
    listen 443 ssl http2;
    server_name ~^(?<sub>[^.]+)\.cuentax\.cl$;

    # Wildcard cert (DNS-01 issued via certbot + Cloudflare plugin).
    ssl_certificate     /etc/nginx/certs/cuentax.cl-wildcard/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/cuentax.cl-wildcard/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 20M;

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ── App principal (Next.js) ──────────────────────────────────────
    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID $request_id;
        proxy_set_header   X-Tenant-Slug $sub;
        proxy_cache_bypass $http_upgrade;
    }

    # ── API tunneled under the tenant subdomain ──────────────────────
    # Allows tenant-scoped frontends to call /api/v1/... directly without
    # CORS. The BFF resolves tenant from the X-Tenant-Slug header (or Host).
    location /api/ {
        proxy_pass         http://bff:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID $request_id;
        proxy_set_header   X-Tenant-Slug $sub;
        limit_req zone=api burst=20 nodelay;
    }

    # ── Next.js static assets ────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
