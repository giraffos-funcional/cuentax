# Alert Rules — CuentaX
# ======================

groups:
  - name: cuentax-alerts
    rules:
      # -- Error rate > 5% for 2 minutes -----------------------
      - alert: HighErrorRate
        expr: rate(http_requests_total{status_code=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate (>5%) on {{ $labels.service }}"
          description: "5xx error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      # -- P99 latency > 5 seconds for 2 minutes ---------------
      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency >5s on {{ $labels.service }}"
          description: "P99 latency is {{ $value | humanizeDuration }} over the last 5 minutes."

      # -- Circuit breaker not closed --------------------------
      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker {{ $labels.name }} is not closed"
          description: "Circuit breaker {{ $labels.name }} state is {{ $value }} (1=open, 2=half-open)."

      # -- BFF target down -------------------------------------
      - alert: BFFDown
        expr: up{job="cuentax-bff"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CuentaX BFF is down"
          description: "Prometheus cannot reach the BFF /metrics endpoint."

      # -- High memory usage (>80% of container limit) ---------
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes{job="cuentax-bff"} > 400 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "BFF memory usage >400MB"
          description: "Resident memory is {{ $value | humanize1024 }}B."
