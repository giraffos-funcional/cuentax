# AlertManager Configuration — CuentaX
# ======================================
# Basic config that logs alerts. Add webhook/email receivers as needed.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'

receivers:
  - name: 'default'
    # TODO: Add webhook_configs for Slack/Discord/email notifications
    webhook_configs: []
