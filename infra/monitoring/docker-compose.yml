# CuentaX Monitoring Stack
# ========================
# Runs SEPARATELY from the app stack.
# Start: docker compose -f infra/monitoring/docker-compose.yml up -d

name: cuentax-monitoring

services:
  # -- Prometheus ------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: cuentax-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - monitoring

  # -- Grafana ---------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: cuentax-grafana
    restart: always
    ports:
      - "3333:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=giraffos2026
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring

  # -- AlertManager ----------------------------------------
  alertmanager:
    image: prom/alertmanager:latest
    container_name: cuentax-alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
