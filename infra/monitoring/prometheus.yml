# Prometheus Configuration — CuentaX
# ====================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # -- CuentaX BFF ----------------------------------------
  # NOTE: host.docker.internal works on macOS/Windows Docker Desktop.
  # On Linux (Hetzner production), replace with:
  #   - the Docker bridge IP (e.g., 172.17.0.1)
  #   - or the host IP on the Docker network
  #   - or use network_mode: host on the Prometheus container
  - job_name: 'cuentax-bff'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:4000']
        labels:
          service: 'bff'

  # -- Prometheus self-monitoring --------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
